<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#ff6b35" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Yahtzee" />
    <title>Yahtzee</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="icon.svg" />
    <link rel="stylesheet" href="styles.css?v=52" />
  </head>
  <body>
    <div class="app-shell">
      <section class="top-strip panel">
        <div class="player-strip">
          <label class="player-chip" id="player-one-chip">
            <span class="player-slot">1</span>
            <input id="player-one-input" name="playerOne" maxlength="24" autocomplete="off" />
            <strong id="player-one-total">0</strong>
          </label>
          <label class="player-chip" id="player-two-chip">
            <span class="player-slot">2</span>
            <input id="player-two-input" name="playerTwo" maxlength="24" autocomplete="off" />
            <strong id="player-two-total">0</strong>
          </label>
          <button id="new-game-button" class="secondary-button compact-button" type="button">New Game</button>
        </div>
      </section>

      <section id="lobby-panel" class="lobby-panel panel" hidden>
        <p id="lobby-copy" class="lobby-copy"></p>
        <div id="queue-section" class="queue-section" hidden>
          <p class="queue-heading">Challenger List</p>
          <div id="queue-list" class="queue-list"></div>
        </div>
      </section>

      <section id="tutorial-overlay" class="tutorial-overlay" hidden>
        <div id="tutorial-bubble" class="tutorial-bubble" role="dialog" aria-modal="true" aria-labelledby="tutorial-title">
          <p id="tutorial-step" class="tutorial-step"></p>
          <h2 id="tutorial-title" class="tutorial-title"></h2>
          <p id="tutorial-text" class="tutorial-text"></p>
          <div class="tutorial-actions">
            <button id="tutorial-skip" class="secondary-button compact-button" type="button">Skip tutorial</button>
            <button id="tutorial-next" class="primary-button compact-button" type="button">Next</button>
          </div>
        </div>
      </section>

      <section id="fun-flash" class="fun-flash" hidden>
        <p id="fun-flash-text" class="fun-flash-text"></p>
      </section>

      <p id="session-banner" class="session-banner" hidden></p>

      <section class="dice-strip panel" aria-label="Dice tray">
        <div id="dice-grid" class="dice-grid"></div>
        <button id="roll-button" class="primary-button roll-button" type="button">Roll (3)</button>
      </section>

      <p id="install-warning" class="install-warning" hidden></p>
      <section id="winner-banner" class="winner-banner panel" hidden>
        <div id="winner-confetti" class="winner-confetti" aria-hidden="true">🎉 ✨ 🎉</div>
        <p class="winner-kicker">Game over</p>
        <h2 id="winner-title">Winner</h2>
        <p id="winner-copy" class="winner-copy"></p>
      </section>

      <main class="scoreboard-panel panel">
        <section class="scoreboard-wrap">
          <table>
            <thead>
              <tr>
                <th>Category <span class="category-version">(Version 2.11)</span></th>
                <th id="player-one-heading">Player 1</th>
                <th id="player-two-heading">Player 2</th>
              </tr>
            </thead>
            <tbody id="scoreboard-body"></tbody>
            <tfoot id="scoreboard-footer"></tfoot>
          </table>
        </section>
      </main>
    </div>

    <template id="die-template">
      <button class="die" type="button">
        <span class="die-value"></span>
      </button>
    </template>

    <script type="module" src="app.js?v=55"></script>
  </body>
</html>
