<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#ff6b35" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Yahtzee" />
    <title>Yahtzee</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="icon.svg" />
    <link rel="stylesheet" href="styles.css?v=36" />
  </head>
  <body>
    <div class="app-shell">
      <section class="top-strip panel">
        <div class="player-strip">
          <label class="player-chip" id="player-one-chip">
            <span class="player-slot">1</span>
            <input id="player-one-input" name="playerOne" maxlength="24" autocomplete="off" />
            <strong id="player-one-total">0</strong>
          </label>
          <label class="player-chip" id="player-two-chip">
            <span class="player-slot">2</span>
            <input id="player-two-input" name="playerTwo" maxlength="24" autocomplete="off" />
            <strong id="player-two-total">0</strong>
          </label>
          <button id="new-game-button" class="secondary-button compact-button" type="button">New</button>
        </div>
      </section>

      <section id="name-entry-modal" class="name-entry-modal" role="dialog" aria-modal="true" aria-labelledby="name-entry-title" hidden>
        <form id="name-entry-form" class="name-entry-card panel" novalidate>
          <p class="name-entry-kicker">Live Play</p>
          <h2 id="name-entry-title">Enter your name</h2>
          <p id="name-entry-copy" class="name-entry-copy">Enter your name to join the challenger list.</p>
          <input id="name-entry-input" class="name-entry-input" name="profileName" maxlength="24" autocomplete="name" placeholder="Your name" />
          <button id="name-entry-button" class="primary-button name-entry-button" type="submit">Enter</button>
        </form>
      </section>

      <section id="challenger-modal" class="challenger-modal" role="dialog" aria-modal="true" aria-labelledby="challenger-title" hidden>
        <div id="challenger-card" class="challenger-card panel" tabindex="-1">
          <p class="challenger-kicker">Live Play</p>
          <h2 id="challenger-title">Choose a challenger</h2>
          <p id="challenger-copy" class="challenger-copy">Step 2: Choose a challenger below.</p>
          <div class="challenger-section">
            <p class="queue-heading">Challenger List</p>
            <div id="challenger-list" class="queue-list"></div>
          </div>
        </div>
      </section>

      <section id="lobby-panel" class="lobby-panel panel" hidden>
        <p id="lobby-copy" class="lobby-copy"></p>
        <div id="queue-section" class="queue-section" hidden>
          <p class="queue-heading">Challenger List</p>
          <div id="queue-list" class="queue-list"></div>
        </div>
      </section>

      <p id="session-banner" class="session-banner" hidden></p>

      <section class="dice-strip panel" aria-label="Dice tray">
        <div id="dice-grid" class="dice-grid"></div>
        <button id="roll-button" class="primary-button roll-button" type="button">Roll (3)</button>
      </section>

      <p id="install-warning" class="install-warning" hidden></p>
      <section id="winner-banner" class="winner-banner panel" hidden>
        <div id="winner-confetti" class="winner-confetti" aria-hidden="true">🎉 ✨ 🎉</div>
        <p class="winner-kicker">Game over</p>
        <h2 id="winner-title">Winner</h2>
        <p id="winner-copy" class="winner-copy"></p>
      </section>

      <main class="scoreboard-panel panel">
        <section class="scoreboard-wrap">
          <table>
            <thead>
              <tr>
                <th>Category <span class="category-version">(Version 1.1)</span></th>
                <th id="player-one-heading">Player 1</th>
                <th id="player-two-heading">Player 2</th>
              </tr>
            </thead>
            <tbody id="scoreboard-body"></tbody>
            <tfoot id="scoreboard-footer"></tfoot>
          </table>
        </section>
      </main>
    </div>

    <template id="die-template">
      <button class="die" type="button">
        <span class="die-value"></span>
      </button>
    </template>

    <script type="module" src="app.js?v=36"></script>
  </body>
</html>
